apiVersion: v1
kind: Secret
metadata:
  name: teachme-backend-secret
  namespace: teachme
type: Opaque
stringData:
  # Add your backend secrets here
  # Example:
  # JWT_SECRET: your-jwt-secret
  # API_KEY: your-api-key
  # KEYCLOAK_CLIENT_SECRET: your-client-secret
  PLACEHOLDER: "update-with-real-secrets"
