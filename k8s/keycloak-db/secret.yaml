apiVersion: v1
kind: Secret
metadata:
  name: teachme-keycloak-db-secret
  namespace: teachme
type: Opaque
stringData:
  # These values need to be base64 encoded when using 'data' instead of 'stringData'
  # Generate with: echo -n 'your-value' | base64
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: CHANGE_ME_IN_PRODUCTION
