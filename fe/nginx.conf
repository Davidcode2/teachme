server {
  listen 80;
  server_name _;
  root /var/www/html;
  index index.html;

  location /assets/ {
    root /var/www/html;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    root   /var/www/html;
    index  index.html index.htm;
    try_files $uri /index.html =404;
  }

  location ~ /api/(?<section>.+) {
    proxy_pass http://172.17.0.1:3000/$section$is_args$args;
  }
}
