name: Build and Deploy Keycloak

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "keycloak/**"
      - "!keycloak/.github/**"

env:
  # Repository configuration
  GITHUB_OWNER: Davidcode2
  APP_REPO_NAME: teachme
  APP_OF_APPS_REPO: app-of-apps

  # Deployment configuration
  DEPLOYMENT_DIR: teachme
  DEPLOYMENT_FILE: teachme-keycloak-deployment.yaml

  # Build configuration
  DOCKERFILE: dockerfile
  CONTEXT: ./keycloak

  # Image configuration
  IMAGE_NAME: ${{ github.repository }}-keycloak
  REGISTRY: ghcr.io

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for relevant changes or manual trigger
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - building"
          else
            if git diff --name-only HEAD^ HEAD | grep -qE '^keycloak/'; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Source changes detected - building"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "No source changes - skipping build"
            fi
          fi

  bump-version:
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.should_build == 'true'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.GITHUB_OWNER }}
          repositories: ${{ env.APP_REPO_NAME }},${{ env.APP_OF_APPS_REPO }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate version from date and sha
        id: bump
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          NEW_VERSION="${DATE}.${SHORT_SHA}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $NEW_VERSION"

      - name: Create version file
        id: push
        run: |
          echo "${{ steps.bump.outputs.version }}" > keycloak/.keycloak-version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keycloak/.keycloak-version
          git commit -m "chore: bump keycloak version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build-and-push:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-reusable.yml
    needs: bump-version
    with:
      image_name: teachme-keycloak
      context: ./keycloak
      dockerfile: ./keycloak/dockerfile
      ref: ${{ needs.bump-version.outputs.sha }}
    secrets: inherit

  deploy-app:
    runs-on: ubuntu-latest
    needs: [bump-version, build-and-push]
    permissions:
      contents: read
    env:
      VERSION: sha-${{ needs.bump-version.outputs.sha }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.GITHUB_OWNER }}
          repositories: ${{ env.APP_OF_APPS_REPO }}

      - name: Checkout app-of-apps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITHUB_OWNER }}/${{ env.APP_OF_APPS_REPO }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update deployment image tag
        working-directory: ${{ env.DEPLOYMENT_DIR }}
        run: |
          OWNER_LC=$(echo "${{ env.GITHUB_OWNER }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ env.APP_REPO_NAME }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: ghcr.io/${OWNER_LC}/${REPO_LC}-keycloak:.*|image: ghcr.io/${OWNER_LC}/${REPO_LC}-keycloak:${VERSION}|g" "${{ env.DEPLOYMENT_FILE }}"
          echo "Updated image tag to ${VERSION}"

      - name: Commit and push deployment changes
        working-directory: ${{ env.DEPLOYMENT_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --exit-code && echo "No changes to commit" && exit 0
          git add .
          git commit -m "deploy: ${{ env.APP_REPO_NAME }} keycloak ${VERSION}"
          git push
