name: Build and Push Frontend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'fe/**'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-and-push-reusable.yml
    with:
      image_name: teachme-frontend
      context: ./fe
      dockerfile: ./fe/dockerfile
    secrets: inherit
