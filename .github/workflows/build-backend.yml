name: Build and Push Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'be/**'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-and-push-reusable.yml
    with:
      image_name: teachme-backend
      context: ./be
      dockerfile: ./be/dockerfile
    secrets: inherit
